options:
  dynamic_substitutions: true

substitutions:
  _BUILD_TYPE: "presubmit"
  _TEST_TYPE: "system"
  _NODE_VERSION: "18"

logsBucket: 'gs://${_LOGS_BUCKET}/logs/google-cloud-node/${_BUILD_TYPE}/${COMMIT_SHA}/${TRIGGER_NAME}'
timeout: 7200s

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Pull Image for Cache'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/${PROJECT_ID}/google-cloud-node-${_NODE_VERSION} || exit 0']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Test Image'
    args: [
      'build',
      '-t', 'gcr.io/${PROJECT_ID}/google-cloud-node-${_NODE_VERSION}',
      '--cache-from', 'gcr.io/${PROJECT_ID}/google-cloud-node-${_NODE_VERSION}',
      '-f', 'ci/Dockerfile',
      '--build-arg', 'NODE_VERSION=${_NODE_VERSION}',
      '.'
    ]
    waitFor: ['Pull Image for Cache']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Test Image'
    args: ['push', 'gcr.io/${PROJECT_ID}/google-cloud-node-${_NODE_VERSION}']
    waitFor: ['Build Test Image']

  - name: gcr.io/cloud-builders/gcloud
    entrypoint: 'bash'
    args: [ '-c', "gcloud secrets versions access latest --project=cloud-devrel-kokoro-resources --secret=long-door-651-kokoro-system-test-service-account --format='get(payload.data)'  | tr '_-' '/+' | base64 -d > /workspace/google_application_credentials.json" ]
    waitFor: ['Push Test Image']

  - name: gcr.io/${PROJECT_ID}/google-cloud-node-${_NODE_VERSION}
    id: "run-tests"
    timeout: 7200s
    entrypoint: "ci/run_conditional_tests.sh"
    waitFor: ['Push Test Image']
    env:
    - 'BUILD_TYPE=${_BUILD_TYPE}'
    - 'TEST_TYPE=${_TEST_TYPE}'
    - 'GOOGLE_APPLICATION_CREDENTIALS=/workspace/google_application_credentials.json'
    - 'BUILD_ID=$BUILD_ID'
    - 'PROJECT_ID=$PROJECT_ID'
    - 'REPO_OWNER=${_REPO_OWNER}'
    - 'REPO_NAME=${_REPO_NAME}'
    - 'COMMIT_SHA=$COMMIT_SHA'
    - 'IS_CORE=${_IS_CORE}'

images:
  - 'gcr.io/${PROJECT_ID}/google-cloud-node-${_NODE_VERSION}'