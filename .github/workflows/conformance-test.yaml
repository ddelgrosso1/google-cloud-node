on:
  push:
    branches:
      - main
    paths:
      - 'handwritten/storage/**'
  pull_request:
    paths:
      - 'handwritten/storage/**'
name: conformance
jobs:
  conformance-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 14
      - run: node --version
      - run: cd handwritten/storage && npm install
      - run: cd handwritten/storage && npm run conformance-test
